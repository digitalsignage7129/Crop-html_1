<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  background: #000;
}

.screen {
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  position: relative;
  background: #000;
}

iframe {
  position: absolute;
  width: 1920px;
  height: 1080px;
  border: none;

  left: -1600px;
  top: -415px;

  transform: scaleX(2.3) scaleY(2.0);
  transform-origin: top left;
}
</style>
</head>

<body>
  <div class="screen">
    <iframe src="https://www2.edam.ne.jp/Public/00642/Sokutei/SSC/RN#"></iframe>
  </div>
</body>
</html>
