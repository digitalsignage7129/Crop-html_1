<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html, body {
  margin: 0;
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  background: #000;
}

.screen {
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  position: relative;
  background: #fff;
}

iframe {
  position: absolute;
  width: 1920px;
  height: 1080px;
  border: none;

  left: -640px;
  top: -290px;

  transform: scale(1.9);
  transform-origin: top left;
}
</style>
</head>

<body>
  <div class="screen">
    <iframe src="https://www2.edam.ne.jp/Public/00642/Sokutei/SSC/RN#"></iframe>
  </div>
</body>
</html>
