<!DOCTYPE html>

<style>
html, body {
  margin: 0;

.screen {
  width: 1920px;

  overflow: hidden;
  position: relative;
  background: #000;
}

iframe {
  position: absolute;
  width: 1920px;
  height: 1080px;
  border: none;

  left: -2146px;
  top: -420px;

  transform: scaleX(3.11) scaleY(1.98);
  transform-origin: top left;
}
</style>
</head>

<body>
<div class="screen">
  <iframe id="target"></iframe>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const url = params.get("url");

const defaultUrl = "https://www2.edam.ne.jp/Public/00642/Sokutei/SSC/RN#";

document.getElementById("target").src = url || defaultUrl;
</script>

</body>
